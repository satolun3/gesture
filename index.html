<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<style>

body {

    text-align: center;

    margin-top: 150px;

}

/* お題の表示 */

#word {

    font-size: 90px;   /* 文字を大きく */

    font-weight: bold; /* 太字 */

    min-height: 120px; /* お題の長さが変わってもガタつかない */

}

/* ボタン */

button {

    font-size: 28px;   /* 少し小さく */

    padding: 15px 30px;

}

</style>

</head>

<body>

<div id="word">スタートを押してね</div>

<br><br>

<button onclick="nextWord()">次のお題</button>

<script>
let words = [
    // 動物
    "ゴリラ",
    "ゾウ",
    "キリン",
    "ペンギン",
    "カンガルー",
    "ウサギ",
    "ネコ",
    "イヌ",

    // スポーツ
    "野球",
    "サッカー",
    "ゴルフ",
    "テニス",
    "卓球",
    "ボウリング",
    "スキー",
    "相撲",

    // 日常動作
    "歯磨き",
    "掃除機をかける",
    "洗濯",
    "料理",
    "寝る",
    "スマホを操作する",
    "写真を撮る",
    "運転する",

    // 職業
    "医者",
    "警察官",
    "消防士",
    "美容師",
    "教師",
    "大工",

    // 乗り物
    "飛行機",
    "自転車",
    "バイク",
    "新幹線",
    "船",

    // 有名人・キャラクター
    "ドラえもん",
    "ピカチュウ",
    "アンパンマン",
    "孫悟空",
    "マリオ",
    "サザエさん",

    // イベント・季節
    "クリスマス",
    "誕生日",
    "結婚式",
    "花火大会",

    // 少し難しい
    "カラオケ",
    "ジェットコースター",
    "筋トレ",
    "ヨガ",
    "釣り",
    "キャンプ",
    "温泉",
    "スーパーマーケット",
    "映画館",
    "遊園地",

    // 整骨院らしいお題
    "マッサージ",
    "鍼治療",
    "ストレッチ",
    "ぎっくり腰"
];
function nextWord() {

    // 全て出題済みの場合

    if (words.length === 0) {

        document.getElementById("word").textContent =

            "お題がなくなりました";

        return;

    }

    // ランダムなインデックスを取得

    const index = Math.floor(Math.random() * words.length);

    // お題を表示し、配列から削除

    const selectedWord = words.splice(index, 1)[0];

    document.getElementById("word").textContent = selectedWord;

}

</script>

</body>

</html>
